name: Publish Docker image

# Manual-only: build the Ameto server image and push it to GitHub Container
# Registry (ghcr.io/<owner>/ameto). Run it from the Actions tab → "Run workflow".
# Uses the built-in GITHUB_TOKEN, so no Personal Access Token / docker login secret
# is required — `packages: write` below is enough to push to this repo's registry.
on:
  workflow_dispatch:
    inputs:
      tag:
        description: 'Image tag to push (e.g. v1.2.0 or a date)'
        required: true
        default: 'latest'
      also_latest:
        description: 'Also tag/push :latest'
        type: boolean
        default: true

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository_owner }}/ameto

permissions:
  contents: read
  packages: write   # required to push to GHCR with GITHUB_TOKEN

jobs:
  build-push:
    name: Build & push to GHCR
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      # Computes lowercase image refs + standard OCI labels.
      # docker/metadata-action lowercases the owner automatically (GHCR requires it).
      - name: Compute tags & labels
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=raw,value=${{ inputs.tag }}
            type=raw,value=latest,enable=${{ inputs.also_latest }}
            type=sha,format=short

      - name: Build & push
        uses: docker/build-push-action@v6
        with:
          context: .                              # repo root (Dockerfile COPYs src/ and client/)
          file: install/docker/Dockerfile
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Summary
        run: |
          echo "### Pushed image" >> "$GITHUB_STEP_SUMMARY"
          echo '```' >> "$GITHUB_STEP_SUMMARY"
          echo "${{ steps.meta.outputs.tags }}" >> "$GITHUB_STEP_SUMMARY"
          echo '```' >> "$GITHUB_STEP_SUMMARY"
