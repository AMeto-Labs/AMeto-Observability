name: Publish Serilog.Sinks.Ameto

# Triggers on a tag like: sinks/v1.2.3
# The version is extracted from the tag and passed to dotnet pack.
on:
  push:
    tags:
      - 'sinks/v*'

permissions:
  contents: read

jobs:
  publish:
    name: Pack & Publish NuGet
    runs-on: ubuntu-latest

    # "nuget" environment must be configured in repo Settings → Environments.
    # On NuGet.org: package → Manage → Trusted Publishers → add GitHub Actions:
    #   Owner:        AMeto-Observability
    #   Repository:   AMeto-Observability
    #   Workflow:     publish-nuget.yml
    #   Environment:  nuget
    environment: nuget

    permissions:
      id-token: write   # required for NuGet trusted publishing (OIDC)
      contents: read

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.x'

      # Extract "1.2.3" from tag "sinks/v1.2.3"
      - name: Extract version from tag
        id: version
        run: echo "value=${GITHUB_REF_NAME#sinks/v}" >> "$GITHUB_OUTPUT"

      - name: Pack
        run: |
          dotnet pack src/Serilog.Sinks.Ameto/Serilog.Sinks.Ameto.csproj \
            --configuration Release \
            --output nupkg \
            --include-symbols \
            -p:SymbolPackageFormat=snupkg \
            -p:ContinuousIntegrationBuild=true \
            -p:Version=${{ steps.version.outputs.value }}

      # Trusted publishing: exchange the GitHub OIDC token for a short-lived
      # NuGet API key — no long-lived secret stored in GitHub.
      - name: Get NuGet token via OIDC
        id: nuget-token
        run: |
          OIDC_TOKEN=$(curl -sSf \
            -H "Authorization: bearer ${ACTIONS_ID_TOKEN_REQUEST_TOKEN}" \
            "${ACTIONS_ID_TOKEN_REQUEST_URL}&audience=api://AzureADTokenExchange" \
            | jq -r '.value')

          NUGET_TOKEN=$(curl -sSf \
            -X POST "https://api.nuget.org/v1/token-from-oidc" \
            -H "Content-Type: application/json" \
            -d "{\"oidcToken\": \"${OIDC_TOKEN}\"}" \
            | jq -r '.token')

          echo "token=${NUGET_TOKEN}" >> "$GITHUB_OUTPUT"

      - name: Push to NuGet.org
        run: |
          dotnet nuget push "nupkg/*.nupkg" \
            --source https://api.nuget.org/v3/index.json \
            --api-key ${{ steps.nuget-token.outputs.token }} \
            --skip-duplicate
