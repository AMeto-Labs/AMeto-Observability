name: Publish Serilog.Sinks.Ameto

# Triggers on a tag like: sinks/v1.2.3
# The version is extracted from the tag and passed to dotnet pack.
on:
  push:
    tags:
      - 'sinks/v*'

permissions:
  contents: read

jobs:
  publish:
    name: Pack & Publish NuGet
    runs-on: ubuntu-latest

    # Must match the environment name configured in NuGet.org Trusted Publishers.
    environment: nuget

    permissions:
      id-token: write  # required for OIDC token request
      contents: read

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.x'

      # Extract "1.2.3" from tag "sinks/v1.2.3"
      - name: Extract version from tag
        id: version
        run: echo "value=${GITHUB_REF_NAME#sinks/v}" >> "$GITHUB_OUTPUT"

      - name: Pack
        run: |
          dotnet pack src/Serilog.Sinks.Ameto/Serilog.Sinks.Ameto.csproj \
            --configuration Release \
            --output nupkg \
            --include-symbols \
            -p:SymbolPackageFormat=snupkg \
            -p:ContinuousIntegrationBuild=true \
            -p:Version=${{ steps.version.outputs.value }}

      # Exchange GitHub OIDC token for a short-lived NuGet API token.
      # NuGet.org must have a Trusted Publisher configured for this repo first.
      - name: Get NuGet token via OIDC
        id: nuget-token
        uses: actions/github-script@v7
        with:
          script: |
            const oidcToken = await core.getIDToken('nuget.org');

            const response = await fetch('https://api.nuget.org/v1/token-from-oidc', {
              method: 'POST',
              headers: { 'Content-Type': 'application/json' },
              body: JSON.stringify({ oidcToken })
            });

            const text = await response.text();

            if (!response.ok) {
              core.setFailed(`NuGet token exchange failed (${response.status}): ${text}`);
              return;
            }

            const { token } = JSON.parse(text);

            if (!token) {
              core.setFailed(`NuGet OIDC exchange returned no token. Response: ${text}`);
              return;
            }

            core.setOutput('token', token);

      - name: Push to NuGet.org
        run: |
          dotnet nuget push "nupkg/*.nupkg" \
            --source https://api.nuget.org/v3/index.json \
            --api-key ${{ steps.nuget-token.outputs.token }} \
            --skip-duplicate
