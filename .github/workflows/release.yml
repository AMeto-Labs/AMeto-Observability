name: Release binaries

# Builds self-contained, single-file Ameto bundles for win-x64 and linux-x64,
# bundles each with its installer + default config, and publishes them as a
# GitHub Release. A single Linux runner cross-compiles both RIDs.
#
# Run manually (Actions → "Release binaries" → Run workflow, enter a version like
# v0.1.0) or automatically by pushing a tag matching v*.
on:
  workflow_dispatch:
    inputs:
      version:
        description: 'Release version / tag (e.g. v0.1.0)'
        required: true
  push:
    tags:
      - 'v*'

permissions:
  contents: write          # required to create the GitHub Release

env:
  PROJECT: src/Ameto.Server/Ameto.Server.csproj
  VERSION: ${{ inputs.version || github.ref_name }}

jobs:
  release:
    name: Build & publish ${{ inputs.version || github.ref_name }}
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'
          cache-dependency-path: client/package-lock.json

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.x'

      # ── Build the Angular SPA once, into the server's wwwroot ────────────────
      - name: Build client
        working-directory: client
        run: |
          npm ci --prefer-offline --no-audit --no-fund
          npx ng build --configuration production --output-path dist
          # Angular 17+ emits to browser/ — flatten into wwwroot
          rm -rf ../src/Ameto.Server/wwwroot
          mkdir -p ../src/Ameto.Server/wwwroot
          if [ -d dist/browser ]; then
            cp -r dist/browser/* ../src/Ameto.Server/wwwroot/
          else
            cp -r dist/* ../src/Ameto.Server/wwwroot/
          fi

      # ── Publish + package both RIDs ──────────────────────────────────────────
      - name: Package linux-x64
        run: |
          dotnet publish "$PROJECT" -c Release -r linux-x64 --self-contained true \
            -p:PublishSingleFile=true -p:EnableCompressionInSingleFile=true \
            -p:DebugType=None -p:DebugSymbols=false \
            -o out/linux-x64
          cp install/linux/install.sh out/linux-x64/install.sh
          chmod +x out/linux-x64/install.sh out/linux-x64/Ameto.Server
          tar -C out/linux-x64 -czf "ameto-${VERSION}-linux-x64.tar.gz" .

      - name: Package win-x64
        run: |
          dotnet publish "$PROJECT" -c Release -r win-x64 --self-contained true \
            -p:PublishSingleFile=true -p:EnableCompressionInSingleFile=true \
            -p:DebugType=None -p:DebugSymbols=false \
            -o out/win-x64
          cp install/windows/install.ps1 out/win-x64/install.ps1
          (cd out/win-x64 && zip -qr "../../ameto-${VERSION}-win-x64.zip" .)

      - name: Checksums
        run: sha256sum ameto-*.tar.gz ameto-*.zip > SHA256SUMS.txt

      - name: Publish GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ env.VERSION }}
          name: ${{ env.VERSION }}
          generate_release_notes: true
          files: |
            ameto-${{ env.VERSION }}-linux-x64.tar.gz
            ameto-${{ env.VERSION }}-win-x64.zip
            SHA256SUMS.txt
