name: Release

# One workflow releases everything: win/linux binaries + Windows installers as a
# GitHub Release, and the Docker image pushed to GHCR (ghcr.io/<owner>/ameto).
#
# Release flow (automatic):
#   1. branch off:            git checkout -b release/1.0.4
#   2. open a PR to main
#   3. merge the PR           → this workflow runs, tags v1.0.4, publishes the
#                               GitHub Release and pushes the Docker image.
#
# Also runs on a pushed v* tag, or manually (Actions → "Release" → Run workflow).
on:
  workflow_dispatch:
    inputs:
      version:
        description: 'Release version / tag (e.g. v1.0.4)'
        required: true
  push:
    tags:
      - 'v*'
  pull_request:
    types: [closed]
    branches: [main]

permissions:
  contents: write          # create the GitHub Release + tag
  packages: write          # push the Docker image to GHCR with GITHUB_TOKEN

env:
  PROJECT: src/Ameto.Server/Ameto.Server.csproj
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository_owner }}/ameto

jobs:
  # ── Resolve the release version from whichever trigger fired ───────────────
  version:
    name: Resolve version
    # Manual runs and v* tags always release; a closed PR releases only when it
    # was actually MERGED into main from a release/* branch.
    if: >-
      github.event_name != 'pull_request' ||
      (github.event.pull_request.merged == true &&
       startsWith(github.event.pull_request.head.ref, 'release/'))
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.v.outputs.version }}
    steps:
      - name: Derive from trigger
        id: v
        env:
          EVENT: ${{ github.event_name }}
          INPUT_VERSION: ${{ inputs.version }}
          PR_BRANCH: ${{ github.event.pull_request.head.ref }}
          REF_NAME: ${{ github.ref_name }}
        run: |
          case "$EVENT" in
            workflow_dispatch) RAW="$INPUT_VERSION" ;;
            pull_request)      RAW="${PR_BRANCH#release/}" ;;  # release/1.0.4 → 1.0.4
            *)                 RAW="$REF_NAME" ;;              # tag push: v1.0.4
          esac
          RAW="v${RAW#v}"                                      # normalise → v1.0.4
          echo "version=$RAW" >> "$GITHUB_OUTPUT"
          echo "Releasing $RAW" >> "$GITHUB_STEP_SUMMARY"

  # ── Binaries: self-contained single-file bundles for both RIDs ─────────────
  release:
    name: Build & publish binaries
    needs: version
    runs-on: ubuntu-latest
    env:
      # Do NOT name this `VERSION`: MSBuild imports env vars as (case-insensitive)
      # build properties, so `VERSION` becomes $(Version) and `dotnet publish` then
      # rejects the tag ("'v1.0.0' is not a valid version string").
      RELEASE_VERSION: ${{ needs.version.outputs.version }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          # For the PR trigger, build the merge commit that landed on main.
          ref: ${{ github.event.pull_request.merge_commit_sha || github.sha }}

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'
          cache-dependency-path: client/package-lock.json

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.x'

      # ── Build the Angular SPA once, into the server's wwwroot ────────────────
      - name: Build client
        working-directory: client
        run: |
          npm ci --prefer-offline --no-audit --no-fund
          npx ng build --configuration production --output-path dist
          # Angular 17+ emits to browser/ — flatten into wwwroot
          rm -rf ../src/Ameto.Server/wwwroot
          mkdir -p ../src/Ameto.Server/wwwroot
          if [ -d dist/browser ]; then
            cp -r dist/browser/* ../src/Ameto.Server/wwwroot/
          else
            cp -r dist/* ../src/Ameto.Server/wwwroot/
          fi

      # ── Publish + package both RIDs ──────────────────────────────────────────
      - name: Package linux-x64
        run: |
          dotnet publish "$PROJECT" -c Release -r linux-x64 --self-contained true \
            -p:PublishSingleFile=true -p:EnableCompressionInSingleFile=true \
            -p:DebugType=None -p:DebugSymbols=false \
            -p:Version="${RELEASE_VERSION#v}" \
            -o out/linux-x64
          cp install/linux/install.sh out/linux-x64/install.sh
          chmod +x out/linux-x64/install.sh out/linux-x64/Ameto.Server
          tar -C out/linux-x64 -czf "ameto-${RELEASE_VERSION}-linux-x64.tar.gz" .

      - name: Package win-x64
        run: |
          dotnet publish "$PROJECT" -c Release -r win-x64 --self-contained true \
            -p:PublishSingleFile=true -p:EnableCompressionInSingleFile=true \
            -p:DebugType=None -p:DebugSymbols=false \
            -p:Version="${RELEASE_VERSION#v}" \
            -o out/win-x64
          cp install/windows/install.ps1 out/win-x64/install.ps1
          (cd out/win-x64 && zip -qr "../../ameto-${RELEASE_VERSION}-win-x64.zip" .)

      - name: Checksums
        run: sha256sum ameto-*.tar.gz ameto-*.zip > SHA256SUMS.txt

      # Fill the version into the install guide; action-gh-release appends the
      # auto-generated changelog after this body (generate_release_notes below).
      - name: Compose release notes (install guide)
        run: sed "s|__VERSION__|${RELEASE_VERSION}|g" .github/release-body.md > RELEASE_BODY.md

      - name: Publish GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ env.RELEASE_VERSION }}
          name: ${{ env.RELEASE_VERSION }}
          target_commitish: ${{ github.event.pull_request.merge_commit_sha || github.sha }}
          body_path: RELEASE_BODY.md
          generate_release_notes: true
          files: |
            ameto-${{ env.RELEASE_VERSION }}-linux-x64.tar.gz
            ameto-${{ env.RELEASE_VERSION }}-win-x64.zip
            SHA256SUMS.txt

  # ── Docker image → GHCR ────────────────────────────────────────────────────
  docker:
    name: Build & push Docker image
    needs: version
    runs-on: ubuntu-latest
    env:
      RELEASE_VERSION: ${{ needs.version.outputs.version }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.pull_request.merge_commit_sha || github.sha }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      # Computes lowercase image refs + standard OCI labels.
      # docker/metadata-action lowercases the owner automatically (GHCR requires it).
      - name: Compute tags & labels
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=raw,value=${{ env.RELEASE_VERSION }}
            type=raw,value=latest
            type=sha,format=short

      # Strip the leading v: MSBuild's Version property wants plain 1.0.4.
      - name: Numeric version
        id: numver
        run: echo "value=${RELEASE_VERSION#v}" >> "$GITHUB_OUTPUT"

      - name: Build & push
        uses: docker/build-push-action@v6
        with:
          context: .                              # repo root (Dockerfile COPYs src/ and client/)
          file: install/docker/Dockerfile
          push: true
          build-args: |
            APP_VERSION=${{ steps.numver.outputs.value }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Summary
        run: |
          echo "### Pushed image" >> "$GITHUB_STEP_SUMMARY"
          echo '```' >> "$GITHUB_STEP_SUMMARY"
          echo "${{ steps.meta.outputs.tags }}" >> "$GITHUB_STEP_SUMMARY"
          echo '```' >> "$GITHUB_STEP_SUMMARY"

  # ── Native Windows installers (Inno Setup) ─────────────────────────────────
  # Inno Setup's ISCC compiler is Windows-only, so the setup.exe artifacts are
  # built on a Windows runner and appended to the release created above.
  windows-installer:
    name: Build Windows installers
    needs: [version, release]
    runs-on: windows-latest
    env:
      RELEASE_VERSION: ${{ needs.version.outputs.version }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.pull_request.merge_commit_sha || github.sha }}

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'
          cache-dependency-path: client/package-lock.json

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.x'

      - name: Install Inno Setup
        run: choco install innosetup --no-progress -y

      # Publishes win-x64 + win-x86 and compiles both setup.exe files.
      - name: Build installers
        shell: pwsh
        run: install/windows/build-installer.ps1 -Version "${{ env.RELEASE_VERSION }}" -Arch both

      - name: Checksums
        shell: pwsh
        run: |
          Get-FileHash install/windows/Output/*.exe -Algorithm SHA256 |
            ForEach-Object { "{0}  {1}" -f $_.Hash.ToLower(), (Split-Path $_.Path -Leaf) } |
            Set-Content install/windows/Output/SHA256SUMS-win-installer.txt

      - name: Append installers to release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ env.RELEASE_VERSION }}
          files: |
            install/windows/Output/ameto-${{ env.RELEASE_VERSION }}-setup-x64.exe
            install/windows/Output/ameto-${{ env.RELEASE_VERSION }}-setup-x86.exe
            install/windows/Output/SHA256SUMS-win-installer.txt
