<div class="page">
  <app-page-header icon="settings" title="Settings"></app-page-header>

  <div class="settings-body">
    <!-- Vertical tab rail -->
    <nav class="settings-tabs">
      @for (tab of availableTabs(); track tab.id) {
        <button
          type="button"
          class="settings-tab"
          [class.active]="activeTab() === tab.id"
          (click)="selectTab(tab.id)"
        >
          <lucide-icon [name]="tab.icon" [size]="15" [strokeWidth]="1.5" />
          <span class="settings-tab__label">{{ tab.label }}</span>
        </button>
      }
    </nav>

    <!-- Tab panels. All sections stay mounted (toggled via [hidden]) so
         in-progress form input is never lost when switching tabs. -->
    <div class="settings-content">
      <app-dashboards-section [hidden]="activeTab() !== 'dashboards'" />
      <app-events-section [hidden]="activeTab() !== 'events'" />
      <app-retention-section [hidden]="activeTab() !== 'retention'" />
      @if (authService.isAdmin()) {
        <app-users-section [hidden]="activeTab() !== 'users'" />
      }
      <app-api-keys-section [hidden]="activeTab() !== 'api-keys'" />
      @if (authService.isAdmin()) {
        <app-updates-section [hidden]="activeTab() !== 'updates'" />
      }
    </div>
  </div>
</div>
