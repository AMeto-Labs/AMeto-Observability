<div class="live-page">
  <div class="toolbar">
    <div class="dot" [class.off]="!running()"></div>
    <h2>Live tail</h2>
    <span class="count">{{ count() }} events</span>
    <button class="btn" [class.on]="running()" (click)="toggle()">
      <lucide-icon [name]="running() ? 'square' : 'play'" [size]="13" />
      {{ running() ? 'Stop' : 'Start' }}
    </button>
  </div>
  <div class="list">
    @for (ev of events(); track ev.id + ev['@t']) {
      <app-event-row [event]="ev" />
    }
    @if (!running() && events().length === 0) {
      <app-empty-state text="Press Start to begin streaming events"></app-empty-state>
    }
  </div>
</div>
