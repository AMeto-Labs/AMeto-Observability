<nav class="nav">
  <!-- Logo -->
  <div class="nav-logo">
    <img src="logo.svg" alt="Ameto" class="logo-img" />
  </div>

  <!-- Main nav items -->
  <div class="nav-items">
    @for (item of visibleItems(); track item.path) {
      <a class="nav-item"
         [routerLink]="item.path"
         routerLinkActive="nav-item--active"
         [title]="item.label">
        <lucide-icon [name]="item.icon" [size]="18" [strokeWidth]="1.5" />
        <span class="nav-label">{{ item.label }}</span>
      </a>
    }
  </div>

  <!-- Bottom: reference + settings + theme + env + user -->
  <div class="nav-bottom">
    <a class="nav-item"
       [routerLink]="referenceItem.path"
       routerLinkActive="nav-item--active"
       [title]="referenceItem.label">
      <lucide-icon [name]="referenceItem.icon" [size]="18" [strokeWidth]="1.5" />
      <span class="nav-label">{{ referenceItem.label }}</span>
    </a>

    <a class="nav-item"
       [routerLink]="settingsItem.path"
       routerLinkActive="nav-item--active"
       [title]="settingsItem.label">
      <lucide-icon [name]="settingsItem.icon" [size]="18" [strokeWidth]="1.5" />
      <span class="nav-label">{{ settingsItem.label }}</span>
    </a>

    <button class="nav-item" type="button" (click)="auth.logout()" title="Sign out">
      <lucide-icon name="log-out" [size]="18" [strokeWidth]="1.5" />
      <span class="nav-label">Sign out</span>
    </button>
  </div>
</nav>
