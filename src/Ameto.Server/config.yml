Ameto:
  NodeId: 0
  DataDirectory: data
  HttpPort: 5341

  # TLS — leave empty for plain HTTP
  SslCertPath: ""
  SslCertPassword: ""

  # Behind a reverse proxy that terminates TLS (nginx/traefik): trust
  # X-Forwarded-Proto/Host so OAuth redirects and links use the public
  # https scheme. Enable ONLY when the server is reachable exclusively
  # through the proxy (clients could spoof the headers otherwise).
  # TrustForwardedHeaders: true

  # ── Sign-in providers ────────────────────────────────────────────────────────
  # Local username/password is on by default. To add "Sign in with Google /
  # Microsoft", set the credentials below (or via env: Ameto__Auth__Google__ClientId
  # etc.) and restart. Redirect URI to register with the provider (https required):
  #   https://<host>/api/auth/oauth/google/callback
  #   https://<host>/api/auth/oauth/microsoft/callback
  # Who may sign in is controlled in Settings → Users: exact-email OAuth users
  # or per-domain rules ("anyone @your-company.com gets role X").
  # Auth:
  #   LocalEnabled: true
  #   Google:
  #     ClientId: ""
  #     ClientSecret: ""
  #   Microsoft:
  #     ClientId: ""
  #     ClientSecret: ""
  #     TenantId: "common"     # Azure AD tenant id, or "common" for multi-tenant

  RamTargetPercent: 75

  HotTier:
    # Maximum size of the in-memory hot tier before it is flushed to disk
    MaxSizeBytes: 67108864   # 64 MB
    MaxAge: "00:05:00"       # 5 minutes — TimeSpan format (hh:mm:ss)

  Indexing:
    MaxPropertyFlattenDepth: 5

  # Ingestion size limits (bytes)
  Ingestion:
    MaxBatchBytes: 4194304        # 4 MB  — max POST /api/events body (larger → 413)
    MaxEventPayloadBytes: 65536   # 64 KB — max properties per event (larger events dropped + logged)
    MaxOtlpBatchBytes: 8388608    # 8 MB  — max OTLP /otlp/v1/* body (larger → 413)
    # OTLP resource attributes to copy onto metric series as labels (opt-in —
    # labels are part of series identity). Logs & traces always carry ALL
    # resource attributes; this list affects metrics only.
    # MetricResourceLabels: ["env", "prid"]

  # Per-level default retention (days).
  # These are only used the very first time — after that the values live in SQLite.
  Retention:
    VerboseDays: 3
    DebugDays: 3
    InformationDays: 90
    WarningDays: 90
    ErrorDays: 90
    FatalDays: 90

  # ── Software-update check (Settings → Updates, admin only) ───────────────────
  # One conditional request to the GitHub Releases API per interval; a 304
  # response costs nothing against the rate limit. Disable for air-gapped hosts.
  Updates:
    Enabled: true
    CheckIntervalMinutes: 60   # min 15

  # ── Replication ──────────────────────────────────────────────────────────────
  # Symmetric: each node replicates its own segments to all peers.
  Replication:
    Enabled: true
    SeedNodes: []
    LocalAddress: ""       # this node's publicly reachable URL, e.g. "http://node0:5341"
    PushTimeout: "00:01:00"    # per-segment HTTP push timeout
    ProbeInterval: "00:00:10"  # how often to probe peers for liveness
