# Consume Ameto from ANOTHER project — pull a pre-built image, no source needed.
#
# 1. Build & push once (from the Ameto repo root):
#      docker build -f install/docker/Dockerfile -t ghcr.io/ameto-observability/ameto:latest .
#      docker push ghcr.io/ameto-observability/ameto:latest
#
# 2. In your other project, copy this block into its docker-compose.yml (or
#    `docker compose -f docker-compose.pull.yml up -d` here). Everything is
#    configured through environment variables — no config.yml required.
services:

  ameto:
    image: ghcr.io/ameto-observability/ameto:${AMETO_TAG:-latest}
    container_name: ameto
    restart: unless-stopped
    pull_policy: always        # always grab the newest pushed image on `up`
    # .NET sizes its heap to this limit and RamPressureService measures
    # RamTargetPercent against the container, not the host's total RAM.
    mem_limit: 1g
    ports:
      - "${AMETO_PORT:-5341}:5341"
    volumes:
      - ameto-data:/data
    environment:
      # All config via env (Ameto__<Section>__<Key>); see full list in docs/CONFIGURATION.md
      Ameto__DataDirectory: /data
      Ameto__HttpPort: "5341"
      Ameto__RamTargetPercent: "75"
      Ameto__Replication__Enabled: "false"
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:5341/health"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s

volumes:
  ameto-data:
